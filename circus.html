<script>
  /* ── Gallery toggle ─────────────────────────────────── */
  const toggleBtn = document.getElementById('gallery-toggle');
  const hiddenFigs = document.querySelectorAll('.gallery-hidden');
  toggleBtn.addEventListener('click', () => {
    const isHidden = hiddenFigs[0].classList.contains('gallery-hidden');
    hiddenFigs.forEach(f => f.classList.toggle('gallery-hidden'));
    toggleBtn.textContent = isHidden ? 'Show less ↑' : 'Show more ↓';
  });

  /* ── Lightbox ────────────────────────────────────────── */
  const lightbox = document.getElementById('lightbox');
  const lbImg    = document.getElementById('lb-img');
  const figures  = document.querySelectorAll('#circus-gallery figure');
  let current    = 0;

  function openLightbox(fig) {
    const imgs = [...document.querySelectorAll('#circus-gallery figure img')];
    current = imgs.indexOf(fig.querySelector('img'));
    showSlide(current);
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function showSlide(idx) {
    const imgs = document.querySelectorAll('#circus-gallery figure img');
    lbImg.src = imgs[idx].src;
    lbImg.alt = imgs[idx].alt;
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  figures.forEach(fig => {
    fig.addEventListener('click', () => openLightbox(fig));
  });

  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-prev').addEventListener('click', () => {
    const total = document.querySelectorAll('#circus-gallery figure img').length;
    current = (current - 1 + total) % total;
    showSlide(current);
  });
  document.getElementById('lb-next').addEventListener('click', () => {
    const total = document.querySelectorAll('#circus-gallery figure img').length;
    current = (current + 1) % total;
    showSlide(current);
  });

  lightbox.addEventListener('click', e => {
    if (e.target === lightbox) closeLightbox();
  });

  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    const total = document.querySelectorAll('#circus-gallery figure img').length;
    if (e.key === 'Escape')     closeLightbox();
    if (e.key === 'ArrowLeft')  { current = (current - 1 + total) % total; showSlide(current); }
    if (e.key === 'ArrowRight') { current = (current + 1) % total; showSlide(current); }
  });
</script>
